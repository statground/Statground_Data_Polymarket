name: Polymarket - Stats report (UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'  # every 1 hour (UTC)

concurrency:
  group: polymarket-stats-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_INTERFACE: ${{ secrets.CLICKHOUSE_INTERFACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate stats report
        run: |
          python -m scripts.polymarket_stats_report

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymarket_stats_artifacts
          path: artifacts/*
          if-no-files-found: error
