name: Polymarket - Stats report (UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *'  # every 1 hour (UTC)

concurrency:
  group: polymarket-stats-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_INTERFACE: ${{ secrets.CLICKHOUSE_INTERFACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system fonts (Korean)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate stats report
        run: |
          python -m scripts.polymarket_stats_report

      - name: Commit reports (md + charts only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only keep required outputs
          git add reports/polymarket_stats/README.md reports/polymarket_stats/charts/*.png

          # Commit only if changed
          if git diff --cached --quiet; then
            echo "[STATS] No changes to commit."
            exit 0
          fi

          git commit -m "chore(stats): update polymarket stats (UTC)"
          git push
