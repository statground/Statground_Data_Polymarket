name: Polymarket - Ingest NEW series/events/markets (UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour at :00 (UTC)

concurrency:
  group: polymarket-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.POLYMARKET_PAT }}
      POLY_BASE: https://gamma-api.polymarket.com
      PYTHONUNBUFFERED: "1"

      INSERT_BATCH_SIZE: ${{ vars.POLYMARKET_INSERT_BATCH_SIZE || '1000' }}
      INSERT_BATCH_SIZE_SERIES: ${{ vars.POLYMARKET_INSERT_BATCH_SIZE_SERIES || '200' }}
      INSERT_MAX_RETRIES: ${{ vars.POLYMARKET_INSERT_MAX_RETRIES || '4' }}
      INSERT_SPLIT_AFTER_ATTEMPT: ${{ vars.POLYMARKET_INSERT_SPLIT_AFTER_ATTEMPT || '2' }}
      INSERT_MIN_SPLIT_BATCH_ROWS: ${{ vars.POLYMARKET_INSERT_MIN_SPLIT_BATCH_ROWS || '25' }}
      CH_SEND_RECEIVE_TIMEOUT: ${{ vars.POLYMARKET_CH_SEND_RECEIVE_TIMEOUT || '900' }}
      INSERT_MAX_PARTITIONS_PER_BLOCK: ${{ vars.POLYMARKET_INSERT_MAX_PARTITIONS_PER_BLOCK || '128' }}

      ORG: statground
      ORCHESTRATOR_REPO: Statground_Data_Polymarket
      DEFAULT_BRANCH: main

      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_INTERFACE: ${{ secrets.CLICKHOUSE_INTERFACE }}
      OPTIMIZE_AFTER_RUN: "1"
      OPTIMIZE_PROB: "0.15"
      OPTIMIZE_MAX_PARTITIONS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install system fonts (Korean)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest new objects
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.polymarket_crawl_to_clickhouse

      - name: Sync latest repository state
        run: |
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

      - name: Generate + push stats report safely
        env:
          STATS_COMMIT_MESSAGE: "chore(stats): update polymarket stats after ingest (UTC)"
        run: |
          python -m scripts.polymarket_sync_and_push_stats