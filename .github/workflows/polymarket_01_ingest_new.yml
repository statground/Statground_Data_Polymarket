name: Polymarket - Ingest NEW series/events/markets (UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every 1 hour (UTC)

concurrency:
  group: polymarket-ingest-new-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.POLYMARKET_PAT }}
      POLY_BASE: https://gamma-api.polymarket.com

      ORG: statground
      ORCHESTRATOR_REPO: Statground_Data_Polymarket
      DEFAULT_BRANCH: main

      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_INTERFACE: ${{ secrets.CLICKHOUSE_INTERFACE }}
      OPTIMIZE_AFTER_RUN: "1"
      OPTIMIZE_PROB: "0.15"
      OPTIMIZE_MAX_PARTITIONS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest new objects
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.polymarket_crawl_to_clickhouse
          mkdir -p artifacts
          # also ship the current checkpoint for visibility
          if [ -f .state/polymarket_checkpoint.json ]; then cp .state/polymarket_checkpoint.json artifacts/; fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymarket_ingest_new_artifacts
          path: artifacts/*
          if-no-files-found: ignore
