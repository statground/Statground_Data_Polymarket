name: Polymarket - Ingest and Refresh to ClickHouse

on:
  workflow_dispatch:
    inputs:
      entities:
        description: "Comma-separated entity list. Use series to resume only failed series after a partial run."
        required: false
        default: "events,markets,series"
      ingest_max_pages:
        description: "Optional ingest MAX_PAGES override."
        required: false
        default: ""
      refresh_max_pages:
        description: "Optional refresh MAX_PAGES override."
        required: false
        default: ""
      ingest_max_objects_per_entity:
        description: "Optional INGEST_MAX_OBJECTS_PER_ENTITY override. 0 disables this cap."
        required: false
        default: ""
      refresh_max_objects_per_entity:
        description: "Optional REFRESH_MAX_OBJECTS_PER_ENTITY override. 0 disables this cap."
        required: false
        default: ""
  schedule:
    - cron: "43 2-23/4 * * *"

permissions:
  contents: read

concurrency:
  group: polymarket-all
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      STATE_BACKEND: clickhouse
      POLY_BASE: https://gamma-api.polymarket.com
      INGEST_MODE: clickhouse
      PRODUCER_SOURCE: github_actions
      PRODUCER_IP: "::"
      ENTITIES: ${{ github.event.inputs.entities || vars.POLYMARKET_ENTITIES || 'events,markets,series' }}
      MAX_PAGES_NO_CHECKPOINT: ${{ vars.POLYMARKET_MAX_PAGES_NO_CHECKPOINT || '20' }}
      USE_KEYSET_PAGINATION: ${{ vars.POLYMARKET_USE_KEYSET_PAGINATION || 'true' }}
      BATCH_SIZE: ${{ vars.POLYMARKET_BATCH_SIZE || vars.POLYMARKET_INSERT_BATCH_SIZE || '500' }}
      BATCH_SIZE_SERIES: ${{ vars.POLYMARKET_BATCH_SIZE_SERIES || vars.POLYMARKET_INSERT_BATCH_SIZE_SERIES || '50' }}
      CH_DATABASE: Data_Prediction_Polymarket_Raw
      CH_REQUEST_TIMEOUT: ${{ vars.POLYMARKET_CH_REQUEST_TIMEOUT || '120' }}
      CH_DIRECT_OUTBOX_FALLBACK: ${{ vars.POLYMARKET_CH_DIRECT_OUTBOX_FALLBACK || 'true' }}
      CH_OUTBOX_DATABASE: Data_Prediction_Polymarket_Log
      CH_OUTBOX_TABLE: polymarket_direct_insert_outbox
      CH_OUTBOX_REPLAY_LIMIT: ${{ vars.POLYMARKET_CH_OUTBOX_REPLAY_LIMIT || '50' }}
      REQUEST_TIMEOUT: ${{ vars.POLYMARKET_REQUEST_TIMEOUT || '30' }}
      CONNECT_TIMEOUT: ${{ vars.POLYMARKET_CONNECT_TIMEOUT || '10' }}
      MAX_RETRIES: ${{ vars.POLYMARKET_MAX_RETRIES || '6' }}
      BASE_SLEEP: ${{ vars.POLYMARKET_BASE_SLEEP || '0.2' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required ClickHouse secrets
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
        run: |
          test -n "$CH_HOST" || { echo "CH_HOST or CLICKHOUSE_HOST secret is required"; exit 1; }
          test -n "$CH_USER" || { echo "CH_USER or CLICKHOUSE_USER secret is required"; exit 1; }
          test -n "$CH_PASSWORD" || { echo "CH_PASSWORD or CLICKHOUSE_PASSWORD secret is required"; exit 1; }
          python3 - <<'PY'
          import hashlib
          import os

          endpoint = f"{os.environ.get('CH_PROTOCOL', 'http')}://{os.environ.get('CH_HOST', '')}:{os.environ.get('CH_PORT') or '8123'}"
          safe = endpoint.replace(".", "[.]").replace(":", "[:]")
          print(f"CLICKHOUSE_ENDPOINT_SANITIZED={safe}")
          print(f"CLICKHOUSE_ENDPOINT_SHA256={hashlib.sha256(endpoint.encode()).hexdigest()}")
          PY

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active Polymarket crawler commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/polymarket-ingest ./cmd/polymarket-refresh

      - name: Ingest new Polymarket objects into ClickHouse
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          MAX_PAGES: ${{ github.event.inputs.ingest_max_pages || vars.POLYMARKET_MAX_PAGES || '50' }}
          INGEST_MAX_OBJECTS_PER_ENTITY: ${{ github.event.inputs.ingest_max_objects_per_entity || vars.POLYMARKET_INGEST_MAX_OBJECTS_PER_ENTITY || '2000' }}
          RUN_SOFT_DEADLINE_SECONDS: ${{ vars.POLYMARKET_INGEST_SOFT_DEADLINE_SECONDS || '1200' }}
        run: |
          go run -mod=mod ./cmd/polymarket-ingest

      - name: Refresh recent Polymarket history into ClickHouse
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
          MAX_PAGES: ${{ github.event.inputs.refresh_max_pages || vars.POLYMARKET_REFRESH_MAX_PAGES || '50' }}
          LOOKBACK_HOURS: ${{ vars.POLYMARKET_LOOKBACK_HOURS || '72' }}
          RUN_SOFT_DEADLINE_SECONDS: ${{ vars.POLYMARKET_REFRESH_SOFT_DEADLINE_SECONDS || '3300' }}
          REFRESH_MAX_OBJECTS_PER_ENTITY: ${{ github.event.inputs.refresh_max_objects_per_entity || vars.POLYMARKET_REFRESH_MAX_OBJECTS_PER_ENTITY || '2000' }}
        run: |
          go run -mod=mod ./cmd/polymarket-refresh

      - name: Refresh MirType provider practice content
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping MirType provider practice content refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          CH_PORT="${CH_PORT:-8123}"
          CH_PROTOCOL="${CH_PROTOCOL:-http}"
          CH_BASE_URL="${CH_PROTOCOL}://${CH_HOST}:${CH_PORT}/${CH_HTTP_URL_PATH}"
          curl --fail --silent --show-error --max-time 300 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SYSTEM REFRESH VIEW mirtype_content.mv_provider_practice_content_refresh"
          curl --fail --silent --show-error --max-time 60 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SELECT * FROM mirtype_content.v_provider_practice_content_current FORMAT TSVWithNames"
