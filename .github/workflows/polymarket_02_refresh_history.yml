name: Polymarket - Refresh history + gap-fill (UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'  # every 1 hour (UTC)

concurrency:
  group: polymarket-refresh-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.POLYMARKET_PAT }}
      POLY_BASE: https://gamma-api.polymarket.com

      # Lookback window for refresh / gap-fill
      LOOKBACK_HOURS: ${{ vars.POLYMARKET_LOOKBACK_HOURS || '72' }}

      ORG: statground
      ORCHESTRATOR_REPO: Statground_Data_Polymarket
      DEFAULT_BRANCH: main

      CLICKHOUSE_HOST: ${{ secrets.CLICKHOUSE_HOST }}
      CLICKHOUSE_PORT: ${{ secrets.CLICKHOUSE_PORT }}
      CLICKHOUSE_USER: ${{ secrets.CLICKHOUSE_USER }}
      CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
      CLICKHOUSE_DATABASE: ${{ secrets.CLICKHOUSE_DATABASE }}
      CLICKHOUSE_INTERFACE: ${{ secrets.CLICKHOUSE_INTERFACE }}
      OPTIMIZE_AFTER_RUN: "1"
      OPTIMIZE_PROB: "0.15"
      OPTIMIZE_MAX_PARTITIONS: "4"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install system fonts (Korean)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh + gap-fill
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -m scripts.polymarket_refresh_and_gapfill

      - name: Sync latest repository state
        run: |
          git pull --rebase origin "${DEFAULT_BRANCH}"

      - name: Generate stats report
        run: |
          python -m scripts.polymarket_stats_report

      - name: Commit reports (md + charts only)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/polymarket_stats/README.md reports/polymarket_stats/charts/*.png

          if git diff --cached --quiet; then
            echo "[STATS] No changes to commit."
            exit 0
          fi

          git commit -m "chore(stats): update polymarket stats after refresh (UTC)"
          git pull --rebase origin "${DEFAULT_BRANCH}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymarket_refresh_artifacts
          path: artifacts/*
          if-no-files-found: ignore
